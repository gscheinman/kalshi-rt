name: Paper Trading Pass

on:
  schedule:
    # Every 30 min, offset from snapshots so paper trader runs ~5 min after
    # the snapshot pass completes. Position dedup in data/positions.json
    # prevents duplicate entries even when this fires faster than markets move.
    - cron: '5,35 * * * *'
    # Redundant offset schedule for skip resilience.
    - cron: '20,50 * * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write

# Prevent two paper-trade runs from racing on git push. Newer run waits
# so we don't lose any trades; the queue is bounded by GitHub's scheduler.
concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-paper-trade
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 scipy numpy lxml

      - name: Run paper trading pass
        run: python engine/paper_trader_ci.py

      - name: Commit paper trade data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/paper_trades.jsonl data/positions.json
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "paper: $(date -u '+%Y-%m-%d %H:%M') UTC"
          # Pull with rebase to handle concurrent pushes from other workflows
          git pull --rebase origin main || true
          git push
