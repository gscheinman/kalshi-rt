name: Market Snapshot (15 min)

on:
  schedule:
    # Primary cadence: every 15 min on the quarter hour.
    # Reviews often arrive in bursts right after a screening or embargo lift,
    # so we need tight intervals during the prime hunting window.
    - cron: '0,15,30,45 * * * *'
    # Redundant offset schedule: GitHub silently skips cron triggers on
    # low-activity repos, so a second schedule at :07 and :37 fills the gaps.
    # Worst-case effective interval if half are skipped: ~20 min.
    - cron: '7,37 * * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write
  actions: write   # needed to trigger the settle workflow on settlement days

# Prevent two snapshot runs from racing on git push. Newer run cancels older
# if they overlap, since the newer snapshot supersedes the older one anyway.
concurrency:
  group: snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-snapshot
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 scipy numpy lxml

      - name: Run snapshot
        run: python tracker/snapshot_ci.py

      - name: Commit snapshot data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.jsonl
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "snapshot: $(date -u '+%Y-%m-%d %H:%M') UTC"
          # Pull with rebase to handle concurrent pushes from other workflows
          git pull --rebase origin main || true
          git push

      # Reliable settlement trigger. GitHub's weekly cron silently skipped
      # the settle.yml run on 2026-05-25. Instead of relying on the cron,
      # the snapshot workflow (which fires every 15 min and is verified
      # reliable) detects settlement conditions and triggers settle.yml
      # via workflow_dispatch. The settle workflow's concurrency group
      # prevents duplicate runs from queuing up.
      - name: Detect settlement-day conditions
        id: detect_settlement
        run: |
          DOW=$(date -u +%u)              # 1=Mon ... 7=Sun
          HOUR=$(date -u +%-H)            # 0-23 (UTC)
          MIN=$(date -u +%-M)
          # Window: Monday 14:30 UTC (10:30 AM ET / 11:30 EDT) through 18:00 UTC.
          # Kalshi settles RT markets at 14:00 UTC; we give a 30-min cushion.
          if [ "$DOW" = "1" ] && [ "$HOUR" -ge 14 ] && [ "$HOUR" -lt 18 ]; then
            if [ "$HOUR" -gt 14 ] || [ "$MIN" -ge 30 ]; then
              echo "in_window=true" >> "$GITHUB_OUTPUT"
              echo "Settlement window active (Mon $HOUR:$MIN UTC)"
            fi
          fi

      - name: Trigger settlement workflow if needed
        if: steps.detect_settlement.outputs.in_window == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only trigger if no settle.yml run today is succeeded OR still running.
          # The settle workflow's concurrency group would queue duplicates, but
          # we'd rather avoid even queuing them to keep Actions logs clean.
          TODAY=$(date -u +%Y-%m-%d)
          ACTIVE_OR_DONE=$(gh run list --workflow=settle.yml \
            --created ">=$TODAY" --limit 10 \
            --json status,conclusion -q \
            '[.[] | select(.status=="in_progress" or .status=="queued" or .conclusion=="success")] | length')
          if [ "$ACTIVE_OR_DONE" = "0" ]; then
            echo "No active or successful settle.yml run today -- triggering."
            gh workflow run settle.yml || echo "(workflow_dispatch may have failed; will retry next snapshot)"
          else
            echo "settle.yml already active/succeeded today ($ACTIVE_OR_DONE runs). Skipping."
          fi
