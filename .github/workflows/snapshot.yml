name: Market Snapshot (15 min)

on:
  schedule:
    # GitHub Actions docs: "schedule events are delayed during periods of
    # high loads of GitHub Actions workflow runs. High load times include
    # the start of every hour." So we deliberately avoid :00/:15/:30/:45
    # (which are high-load) and pile in many off-peak slots. Measured skip
    # rate at :00 boundaries was >80%; offset times skip far less often.
    #
    # 12 total scheduled attempts per hour. Even with 50% skipping we still
    # get a snapshot every ~10 min. The concurrency group at the job level
    # dedups any that fire close together.
    - cron: '3,18,33,48 * * * *'
    - cron: '8,23,38,53 * * * *'
    - cron: '13,28,43,58 * * * *'
  workflow_dispatch:  # Manual trigger via GitHub UI or external cron (cron-job.org)
  repository_dispatch:
    types: [trigger-snapshot]   # External services can POST events of this type

permissions:
  contents: write
  actions: write   # needed to trigger the settle workflow on settlement days
  issues: write    # needed to open first-reviews-detected notification issues

# Prevent two snapshot runs from racing on git push. Newer run cancels older
# if they overlap, since the newer snapshot supersedes the older one anyway.
concurrency:
  group: snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-snapshot
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 scipy numpy lxml

      - name: Run snapshot
        id: snap
        run: |
          # Capture the snapshot output so the next step can scan for transition markers.
          set -o pipefail
          python tracker/snapshot_ci.py | tee snapshot_output.log

      - name: Notify on first-reviews transitions
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ ! -f snapshot_output.log ]; then
            echo "No snapshot output captured, skipping."
            exit 0
          fi
          # Parse marker lines and create one GitHub issue per detected market.
          grep -E '^FIRST_REVIEWS_DETECTED ' snapshot_output.log | while IFS= read -r line; do
            TICKER=$(echo "$line"   | sed -nE 's/.*ticker=([A-Z0-9_-]+).*/\1/p')
            MOVIE=$(echo "$line"    | sed -nE "s/.*movie='([^']+)'.*/\1/p")
            NREV=$(echo "$line"     | sed -nE 's/.*n_reviews=([0-9]+).*/\1/p')
            NAIVE=$(echo "$line"    | sed -nE 's/.*naive=([0-9.]+).*/\1/p')
            MMEAN=$(echo "$line"    | sed -nE 's/.*model_mean=([0-9.]+).*/\1/p')
            EDGE=$(echo "$line"     | sed -nE 's/.*best_edge=(-?[0-9.]+).*/\1/p')
            TITLE="First reviews detected: $MOVIE ($TICKER)"
            BODY=$(cat <<EOF
          @gscheinman heads up:

          The snapshot pipeline just observed the first critic reviews on RT for **$MOVIE** (\`$TICKER\`). This market has entered the active trading window.

          - Reviews scraped: **$NREV**
          - Naive Fresh rate: $NAIVE%
          - Model mean: $MMEAN%
          - Best edge across thresholds: $EDGE%

          Tier eligibility: with $NREV reviews the market is in the [5-40] tier (min edge 12%) once it crosses 5 reviews. Paper trades will fire automatically on the next paper_trade run if any threshold has edge clearing the tier filter and sanity guards.

          [View workflow run](https://github.com/${GH_REPO}/actions/runs/${{ github.run_id }})
          EOF
          )
            # Avoid duplicate notifications if the issue already exists for this ticker.
            EXISTING=$(gh issue list --search "$TICKER in:title" --state all --json number -q 'length' || echo 0)
            if [ "$EXISTING" = "0" ]; then
              gh issue create --title "$TITLE" --body "$BODY" --label "first-reviews" || \
                gh issue create --title "$TITLE" --body "$BODY"
              echo "Opened issue for $TICKER"
            else
              echo "Issue already exists for $TICKER, skipping."
            fi
          done

      - name: Commit snapshot data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots.jsonl
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "snapshot: $(date -u '+%Y-%m-%d %H:%M') UTC"
          # Pull with rebase to handle concurrent pushes from other workflows
          git pull --rebase origin main || true
          git push

      # Reliable settlement trigger. GitHub's weekly cron silently skipped
      # the settle.yml run on 2026-05-25. Instead of relying on the cron,
      # the snapshot workflow (which fires every 15 min and is verified
      # reliable) detects settlement conditions and triggers settle.yml
      # via workflow_dispatch. The settle workflow's concurrency group
      # prevents duplicate runs from queuing up.
      - name: Detect settlement-day conditions
        id: detect_settlement
        run: |
          DOW=$(date -u +%u)              # 1=Mon ... 7=Sun
          HOUR=$(date -u +%-H)            # 0-23 (UTC)
          MIN=$(date -u +%-M)
          # Window: Monday 14:30 UTC (10:30 AM ET / 11:30 EDT) through 18:00 UTC.
          # Kalshi settles RT markets at 14:00 UTC; we give a 30-min cushion.
          if [ "$DOW" = "1" ] && [ "$HOUR" -ge 14 ] && [ "$HOUR" -lt 18 ]; then
            if [ "$HOUR" -gt 14 ] || [ "$MIN" -ge 30 ]; then
              echo "in_window=true" >> "$GITHUB_OUTPUT"
              echo "Settlement window active (Mon $HOUR:$MIN UTC)"
            fi
          fi

      - name: Trigger settlement workflow if needed
        if: steps.detect_settlement.outputs.in_window == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only trigger if no settle.yml run today is succeeded OR still running.
          # The settle workflow's concurrency group would queue duplicates, but
          # we'd rather avoid even queuing them to keep Actions logs clean.
          TODAY=$(date -u +%Y-%m-%d)
          ACTIVE_OR_DONE=$(gh run list --workflow=settle.yml \
            --created ">=$TODAY" --limit 10 \
            --json status,conclusion -q \
            '[.[] | select(.status=="in_progress" or .status=="queued" or .conclusion=="success")] | length')
          if [ "$ACTIVE_OR_DONE" = "0" ]; then
            echo "No active or successful settle.yml run today -- triggering."
            gh workflow run settle.yml || echo "(workflow_dispatch may have failed; will retry next snapshot)"
          else
            echo "settle.yml already active/succeeded today ($ACTIVE_OR_DONE runs). Skipping."
          fi
